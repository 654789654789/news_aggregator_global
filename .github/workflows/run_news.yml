name: PulseMesh Auto-Update

on:
  workflow_dispatch:

jobs:
  run-aggregator:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run Data Engine
        run: python data_engine/update_feed.py
      
      - name: Save JSON Database
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update PulseMesh JSON database [skip ci]"
